{% extends "layouts/base.html" %}
{% load static %}

{% block title %}Searching Page{% endblock title %}

{% block stylesheets %}
<style>
    .searchForm {
        margin-top: 20px;
    }

    button:hover {
        background-color: green;
        color: white;
    }
</style>
{% endblock stylesheets %}

{% block content %}
<div class="card">
    <h1>Searching Page</h1>
    <form class="searchForm" method="post" action="">
        {% csrf_token %}
        <label>Keywords:</label>
        <input type="text" name="keyword" placeholder="enter a keyword" />

        <br />

        <label>Search in:</label>
        <label><input type="checkbox" name="title" />Title</label>
        <label><input type="checkbox" name="author" />Author</label>

        <br />

        <button type="submit"><i class="fa fa-search" aria-hidden="true"></i> search</button>
    </form>
</div>
{% endblock content %}
