<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CS471 Lab 6{% endblock title %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }
        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }
        .nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .nav a {
            text-decoration: none;
            color: #0f172a;
            background: #fff;
            border: 1px solid #dbe4f0;
            border-radius: 999px;
            padding: 10px 16px;
        }
        .card {
            background: #fff;
            border: 1px solid #dbe4f0;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
            margin-bottom: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cfd8e3;
            border-radius: 10px;
            font-size: 1rem;
        }
        button {
            color: #fff;
            background-color: #17a2b8;
            border-color: #17a2b8;
            border: none;
            padding: 16px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 12px 2px 0;
            transition-duration: 0.4s;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover {
            background-color: #138496;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 12px;
            text-align: left;
        }
        .message {
            padding: 12px 14px;
            border-radius: 10px;
            margin-top: 16px;
        }
        .success {
            background: #e8f8f2;
            color: #166534;
        }
        .error {
            background: #fef2f2;
            color: #b91c1c;
        }
    </style>
    {% block stylesheets %}{% endblock stylesheets %}
</head>
<body>
    <div class="page">
        <div class="nav">
            <a href="{% url 'book-search' %}"><i class="fa fa-search"></i> Book Search</a>
            <a href="{% url 'user-register' %}"><i class="fa fa-user"></i> User Form</a>
            <a href="{% url 'book-index' %}"><i class="fa fa-home"></i> Books Home</a>
        </div>
        {% block content %}{% endblock content %}
    </div>
</body>
</html>
