<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ book.title|default:"Book Details" }}</title>
</head>
<body>
    {% if book %}
    <h4>ID: {{ book.id }}</h4>
    <h4>Title: {{ book.title }}</h4>
    <h4>Authors</h4>
    <p>{{ book.author }}</p>
    <h4>Description</h4>
    <p>Description here</p>
    {% else %}
    <p>Book not found.</p>
    {% endif %}
</body>
</html>
